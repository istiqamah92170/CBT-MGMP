/* ── ANALISIS ── */
.ana-list{display:flex;flex-direction:column;gap:12px;}
.ana-item{border:1.5px solid var(--gray-line);border-radius:var(--r-md);overflow:hidden;}
.ana-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;}
.ana-head.benar{background:var(--green-light);} .ana-head.salah{background:var(--red-light);}
.ana-head.kosong{background:var(--gray-bg);} .ana-head.esai-p{background:var(--orange-light);}
.ana-no{font-size:14px;font-weight:800;}
.ana-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.ana-badge.benar{background:var(--green);color:white;} .ana-badge.salah{background:var(--red);color:white;}
.ana-badge.kosong{background:var(--gray-soft);color:white;} .ana-badge.esai-p{background:var(--orange);color:white;}
.ana-teks{padding:12px 14px;background:var(--blue-pale);font-size:13px;line-height:1.6;border-top:1px solid var(--blue-light);white-space:pre-wrap;word-break:break-word;}
.ana-img{padding:10px 14px;background:var(--gray-bg);border-top:1px solid var(--gray-line);}
.ana-img img{max-width:100%;border-radius:var(--r-sm);}
.ana-opsi{padding:10px 14px;border-top:1px solid var(--gray-line);background:var(--white);}
.ana-opsi-ttl{font-size:11px;font-weight:700;color:var(--gray-soft);margin-bottom:6px;text-transform:uppercase;}
.opsi-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;}
.opsi-row.kunci{font-weight:700;color:var(--green);}
.opsi-row.salah-mark{color:var(--red);text-decoration:line-through;opacity:.7;}
.opsi-ltr{width:30px;height:30px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:var(--gray-bg);color:var(--gray-mid);border:1.5px solid var(--gray-line);}
.opsi-row.kunci .opsi-ltr{background:var(--green);color:white;border-color:var(--green);}
.opsi-row.salah-mark .opsi-ltr{background:var(--red-light);color:var(--red);border-color:var(--red);}
.opsi-img-sm{max-height:60px;border-radius:4px;border:1px solid var(--gray-line);}
.kunci-bar{padding:10px 14px;background:var(--blue-pale);border-top:1px solid var(--blue-light);font-size:13px;font-weight:700;color:var(--blue-main);}
.pemb-bar{padding:12px 14px;background:var(--green-light);border-top:1px solid #A8D5BB;font-size:13px;color:var(--gray-dark);line-height:1.6;}
.pemb-bar strong{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;display:block;margin-bottom:4px;}
.rubrik-bar{padding:10px 14px;background:#E8F4FF;border-top:1px solid #B3D4F5;font-size:12px;color:var(--blue-main);}
.esai-ans{padding:12px 14px;background:#FFFDF5;border-top:1px solid #FFE082;font-size:13px;}
.esai-ans strong{color:var(--orange);display:block;margin-bottom:4px;}
.esai-ans .teks{padding:10px;background:white;border:1px solid #FFE082;border-radius:var(--r-sm);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.poin-bar{padding:6px 14px;background:var(--yellow-light);border-top:1px solid #E8D48A;font-size:11px;font-weight:700;color:var(--yellow);}
.btn-tutup{width:100%;padding:12px;margin-top:8px;background:var(--gray-bg);color:var(--gray-dark);border:1.5px solid var(--gray-line);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-tutup:hover{background:var(--gray-line);}

/* ── PRINT PDF PEMBAHASAN ── */
.btn-print-analisis{width:100%;padding:12px;margin-top:0;margin-bottom:10px;background:var(--green);color:white;border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-print-analisis:hover{opacity:.88;}


@media(max-width:768px){
  .exam-wrap{flex-direction:column;}
  .right-panel{width:100%;position:static;max-height:none;}
  .grid-nomor{grid-template-columns:repeat(6,1fr);}
}

/* ── FONT ARAB ── */
:root { --font-arab: 20px; }
.arab-txt { font-family:'Scheherazade New',serif; font-size:var(--font-arab); direction:rtl; line-height:2; }

/* ── ISOLASI LAYAR ── */
#portal-screen,#portal-cbt-screen,#portal-riwayat-screen,
#portal-detail-screen,#portal-profil-screen,#portal-backup-screen {
  width:100%; max-width:440px; display:none;
}
.login-wrap   { display:none; }
.hasil-wrap   { width:100%; max-width:640px; display:none; }
.exam-wrap    { display:none; width:100%; max-width:1120px; gap:20px; align-items:flex-start; }

/* ── SPLIT SCREEN LOCK OVERLAY ── */
#split-lock-overlay{display:none;position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#0A3566,#1a1a2e);
  flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
#split-lock-overlay.aktif{display:flex;}
.split-lock-ikon{font-size:64px;margin-bottom:20px;animation:spin-slow 3s linear infinite;}
@keyframes spin-slow{to{transform:rotate(360deg)}}
.split-lock-judul{font-size:20px;font-weight:800;color:#fff;margin-bottom:12px;line-height:1.3;}
.split-lock-pesan{font-size:14px;color:rgba(255,255,255,.75);line-height:1.7;max-width:320px;margin-bottom:28px;}
.split-lock-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);
  border:1.5px solid rgba(255,255,255,.25);border-radius:24px;padding:10px 20px;
  font-size:13px;font-weight:700;color:#10B981;animation:pulse-badge 1.8s ease-in-out infinite;}
@keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:.5}}
.split-lock-dot{width:10px;height:10px;border-radius:50%;background:#10B981;}

/* ── PORTAL SISWA — CSS (tema biru) ── */
.p-wrap{width:100%;max-width:440px;margin:0 auto;padding:16px 0 48px;}
.p-header{background:linear-gradient(135deg,var(--blue-deep) 0%,var(--blue-main) 60%,var(--blue-mid) 100%);
  border-radius:var(--r-lg);padding:24px 24px 20px;color:white;margin-bottom:16px;
  box-shadow:var(--sh-lg);position:relative;overflow:hidden;}
.p-header::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;
  border-radius:50%;background:rgba(255,255,255,.07);}
.p-header::after{content:'';position:absolute;bottom:-20px;left:-10px;width:80px;height:80px;
  border-radius:50%;background:rgba(255,255,255,.05);}
.p-header-top{display:flex;align-items:center;gap:14px;margin-bottom:16px;position:relative;z-index:1;}
.p-logo{font-size:38px;flex-shrink:0;}
.p-brand h1{font-size:18px;font-weight:800;margin:0 0 2px;}
.p-brand p{font-size:11px;opacity:.75;margin:0;}
.p-profil-aktif{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:var(--r-md);padding:10px 14px;display:flex;align-items:center;gap:10px;position:relative;z-index:1;}
.p-profil-aktif .avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;}
.p-profil-aktif .info{flex:1;min-width:0;}
.p-profil-aktif .info .label{font-size:10px;opacity:.7;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.p-profil-aktif .info .nama{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-profil-aktif .info .no-profil{font-size:11px;opacity:.6;font-style:italic;}
.p-profil-ganti{font-size:10px;background:rgba(255,255,255,.2);border:none;color:white;
  border-radius:20px;padding:4px 10px;cursor:pointer;font-weight:600;flex-shrink:0;}
.p-menu{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.p-menu-item{background:var(--white);border-radius:var(--r-md);padding:16px 14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  box-shadow:var(--sh-sm);cursor:pointer;border:1.5px solid var(--gray-line);
  transition:all .2s;text-align:center;user-select:none;}
.p-menu-item:active{transform:scale(.97);}
.p-menu-item.primary{background:linear-gradient(135deg,var(--blue-deep),var(--blue-mid));color:white;
  border-color:transparent;box-shadow:var(--sh-md);grid-column:1/-1;}
.p-menu-item .ico{font-size:28px;line-height:1;}
.p-menu-item.primary .ico{font-size:32px;}
.p-menu-item .lbl{font-size:12px;font-weight:700;color:var(--gray-dark);}
.p-menu-item.primary .lbl{font-size:14px;color:white;}
.p-menu-item .sub{font-size:10px;color:var(--gray-soft);}
.p-menu-item.primary .sub{color:rgba(255,255,255,.75);}
.p-card{background:var(--white);border-radius:var(--r-lg);box-shadow:var(--sh-md);overflow:hidden;margin-bottom:12px;}
.p-card-head{background:linear-gradient(135deg,var(--blue-deep),var(--blue-mid));padding:18px 20px 14px;color:white;}
.p-card-head h2{font-size:16px;font-weight:800;margin:0 0 2px;}
.p-card-head p{font-size:11px;opacity:.75;margin:0;}
.p-card-body{padding:20px;}
.p-btn{width:100%;padding:13px;border:none;border-radius:var(--r-md);font-size:14px;
  font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:8px;font-family:inherit;}
.p-btn:last-child{margin-bottom:0;}
.p-btn.primary{background:linear-gradient(135deg,var(--blue-deep),var(--blue-mid));color:white;box-shadow:var(--sh-sm);}
.p-btn.secondary{background:var(--gray-bg);color:var(--gray-dark);border:1.5px solid var(--gray-line);}
.p-btn.danger{background:var(--red-light);color:var(--red);border:1.5px solid #F5B7B1;}
.p-btn:disabled{opacity:.5;cursor:not-allowed;}
.p-btn:active:not(:disabled){transform:scale(.98);}
.p-fg{margin-bottom:14px;}
.p-fg label{display:block;font-size:12px;font-weight:700;color:var(--gray-mid);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:.4px;}
.p-fg input,.p-fg select{width:100%;padding:11px 14px;border:1.5px solid var(--gray-line);
  border-radius:var(--r-sm);font-size:14px;font-family:inherit;outline:none;
  background:var(--white);transition:border-color .2s;}
.p-fg input:focus,.p-fg select:focus{border-color:var(--blue-mid);}
.p-autocomplete{position:relative;}
.p-ac-list{position:absolute;top:100%;left:0;right:0;background:var(--white);
  border:1.5px solid var(--blue-mid);border-top:none;border-radius:0 0 var(--r-sm) var(--r-sm);
  z-index:100;max-height:160px;overflow-y:auto;box-shadow:var(--sh-md);}
.p-ac-item{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--gray-line);}
.p-ac-item:last-child{border-bottom:none;}
.p-ac-item:hover{background:var(--blue-pale);color:var(--blue-main);font-weight:600;}
.p-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;
  color:var(--blue-main);cursor:pointer;margin-bottom:14px;background:none;border:none;
  padding:0;font-family:inherit;}
.p-riwayat-list{display:flex;flex-direction:column;gap:10px;}
.p-riwayat-item{background:var(--white);border:1.5px solid var(--gray-line);border-radius:var(--r-md);
  padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:all .2s;box-shadow:var(--sh-sm);}
.p-riwayat-item:active{transform:scale(.98);}
.p-riwayat-item .r-nilai{width:52px;height:52px;border-radius:var(--r-sm);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;}
.p-riwayat-item .r-nilai.A{background:var(--green-light);color:var(--green);}
.p-riwayat-item .r-nilai.B{background:var(--blue-pale);color:var(--blue-main);}
.p-riwayat-item .r-nilai.C{background:var(--yellow-light);color:var(--yellow);}
.p-riwayat-item .r-nilai.D,.p-riwayat-item .r-nilai.E{background:var(--red-light);color:var(--red);}
.p-riwayat-item .r-info{flex:1;min-width:0;}
.p-riwayat-item .r-judul{font-size:14px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-riwayat-item .r-meta{font-size:11px;color:var(--gray-soft);}
.p-riwayat-item .r-arrow{font-size:18px;color:var(--gray-soft);}
.p-riwayat-kosong{text-align:center;padding:40px 20px;color:var(--gray-soft);}
.p-riwayat-kosong .ico{font-size:40px;display:block;margin-bottom:10px;}
.p-profil-list{display:flex;flex-direction:column;gap:8px;}
.p-profil-item{background:var(--white);border:1.5px solid var(--gray-line);border-radius:var(--r-md);
  padding:12px 14px;display:flex;align-items:center;gap:12px;transition:all .2s;}
.p-profil-item.aktif-profil{border-color:var(--blue-main);background:var(--blue-pale);}
.p-profil-item .p-av{width:38px;height:38px;border-radius:50%;background:var(--blue-light);
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;
  color:var(--blue-main);flex-shrink:0;}
.p-profil-item.aktif-profil .p-av{background:var(--blue-main);color:white;}
.p-profil-item .p-info{flex:1;min-width:0;}
.p-profil-item .p-pnama{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-profil-item .p-pbadge{font-size:10px;font-weight:700;color:var(--blue-main);
  background:var(--blue-pale);padding:1px 7px;border-radius:8px;margin-top:2px;display:inline-block;}
.p-profil-aksi{display:flex;gap:6px;}
.p-profil-aksi button{padding:5px 10px;font-size:11px;font-weight:700;border-radius:6px;
  border:1px solid var(--gray-line);background:var(--gray-bg);cursor:pointer;font-family:inherit;}
.p-profil-aksi .pilih{background:var(--blue-main);color:white;border-color:var(--blue-main);}
.p-profil-aksi .hapus{background:var(--red-light);color:var(--red);border-color:#F5B7B1;}
.p-modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;
  align-items:center;justify-content:center;padding:20px;}
.p-modal-ov.aktif{display:flex;}
.p-modal-box{background:var(--white);border-radius:var(--r-lg);padding:24px;width:100%;
  max-width:380px;box-shadow:var(--sh-lg);}
.p-modal-box h3{font-size:16px;font-weight:800;margin:0 0 6px;}
.p-modal-box p{font-size:13px;color:var(--gray-mid);margin:0 0 16px;line-height:1.6;}
.p-modal-btns{display:flex;gap:8px;margin-top:16px;}
.p-modal-btns button{flex:1;padding:11px;border:none;border-radius:var(--r-sm);font-size:13px;
  font-weight:700;cursor:pointer;font-family:inherit;}
.p-modal-btns .batal{background:var(--gray-bg);color:var(--gray-dark);border:1.5px solid var(--gray-line);}
.p-modal-btns .ya{background:var(--blue-main);color:white;}
.p-modal-btns .ya.merah{background:var(--red);}
.p-kode-hint{font-size:12px;color:var(--gray-soft);line-height:1.6;margin-top:4px;}
.p-profil-pilih-aktif{background:var(--blue-pale);border:1.5px solid var(--blue-main);
  border-radius:var(--r-md);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.p-profil-pilih-aktif .av{width:32px;height:32px;border-radius:50%;background:var(--blue-main);
  color:white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;}
.p-profil-pilih-aktif .info{flex:1;}
.p-profil-pilih-aktif .info .nm{font-size:13px;font-weight:700;}
.p-profil-pilih-aktif .info .sub{font-size:11px;color:var(--gray-soft);}
.p-backup-info{background:var(--blue-pale);border:1.5px solid var(--blue-light);
  border-radius:var(--r-md);padding:12px 14px;font-size:12px;color:var(--blue-main);
  margin-bottom:16px;line-height:1.7;}
.p-ad-slot{display:none;background:var(--gray-bg);border:1.5px dashed var(--gray-line);
  border-radius:var(--r-md);padding:16px;text-align:center;color:var(--gray-soft);
  font-size:12px;margin-bottom:12px;}
.p-ad-slot.aktif{display:block;}
.p-version{text-align:center;font-size:10px;color:var(--gray-soft);margin-top:8px;letter-spacing:.5px;}
