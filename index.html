/* ── ANALISIS ── */
.ana-list{display:flex;flex-direction:column;gap:12px;}
.ana-item{border:1.5px solid var(--gray-line);border-radius:var(--r-md);overflow:hidden;}
.ana-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;}
.ana-head.benar{background:var(--green-light);} .ana-head.salah{background:var(--red-light);}
.ana-head.kosong{background:var(--gray-bg);} .ana-head.esai-p{background:var(--orange-light);}
.ana-no{font-size:14px;font-weight:800;}
.ana-badge{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.ana-badge.benar{background:var(--green);color:white;} .ana-badge.salah{background:var(--red);color:white;}
.ana-badge.kosong{background:var(--gray-soft);color:white;} .ana-badge.esai-p{background:var(--orange);color:white;}
.ana-teks{padding:12px 14px;background:var(--blue-pale);font-size:13px;line-height:1.6;border-top:1px solid var(--blue-light);white-space:pre-wrap;word-break:break-word;}
.ana-img{padding:10px 14px;background:var(--gray-bg);border-top:1px solid var(--gray-line);}
.ana-img img{max-width:100%;border-radius:var(--r-sm);}
.ana-opsi{padding:10px 14px;border-top:1px solid var(--gray-line);background:var(--white);}
.ana-opsi-ttl{font-size:11px;font-weight:700;color:var(--gray-soft);margin-bottom:6px;text-transform:uppercase;}
.opsi-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;}
.opsi-row.kunci{font-weight:700;color:var(--green);}
.opsi-row.salah-mark{color:var(--red);text-decoration:line-through;opacity:.7;}
.opsi-ltr{width:30px;height:30px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:var(--gray-bg);color:var(--gray-mid);border:1.5px solid var(--gray-line);}
.opsi-row.kunci .opsi-ltr{background:var(--green);color:white;border-color:var(--green);}
.opsi-row.salah-mark .opsi-ltr{background:var(--red-light);color:var(--red);border-color:var(--red);}
.opsi-img-sm{max-height:60px;border-radius:4px;border:1px solid var(--gray-line);}
.kunci-bar{padding:10px 14px;background:var(--blue-pale);border-top:1px solid var(--blue-light);font-size:13px;font-weight:700;color:var(--blue-main);}
.pemb-bar{padding:12px 14px;background:var(--green-light);border-top:1px solid #A8D5BB;font-size:13px;color:var(--gray-dark);line-height:1.6;}
.pemb-bar strong{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;display:block;margin-bottom:4px;}
.rubrik-bar{padding:10px 14px;background:#E8F4FF;border-top:1px solid #B3D4F5;font-size:12px;color:var(--blue-main);}
.esai-ans{padding:12px 14px;background:#FFFDF5;border-top:1px solid #FFE082;font-size:13px;}
.esai-ans strong{color:var(--orange);display:block;margin-bottom:4px;}
.esai-ans .teks{padding:10px;background:white;border:1px solid #FFE082;border-radius:var(--r-sm);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.poin-bar{padding:6px 14px;background:var(--yellow-light);border-top:1px solid #E8D48A;font-size:11px;font-weight:700;color:var(--yellow);}
.btn-tutup{width:100%;padding:12px;margin-top:8px;background:var(--gray-bg);color:var(--gray-dark);border:1.5px solid var(--gray-line);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-tutup:hover{background:var(--gray-line);}

/* ── PRINT PDF PEMBAHASAN ── */
.btn-print-analisis{width:100%;padding:12px;margin-top:0;margin-bottom:10px;background:var(--green);color:white;border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-print-analisis:hover{opacity:.88;}


@media(max-width:768px){
  .exam-wrap{flex-direction:column;}
  .right-panel{width:100%;position:static;max-height:none;}
  .grid-nomor{grid-template-columns:repeat(6,1fr);}
}

/* ── FONT ARAB ── */
:root { --font-arab: 20px; }
.arab-txt { font-family:'Scheherazade New',serif; font-size:var(--font-arab); direction:rtl; line-height:2; }

/* ── ISOLASI LAYAR ── */
#portal-screen,#portal-cbt-screen,#portal-riwayat-screen,
#portal-detail-screen,#portal-profil-screen,#portal-backup-screen {
  width:100%; max-width:440px; display:none;
}
.login-wrap   { display:none; }
.hasil-wrap   { width:100%; max-width:640px; display:none; }
.exam-wrap    { display:none; width:100%; max-width:1120px; gap:20px; align-items:flex-start; }

/* ── SPLIT SCREEN LOCK OVERLAY ── */
#split-lock-overlay{display:none;position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#0A3566,#1a1a2e);
  flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
#split-lock-overlay.aktif{display:flex;}
.split-lock-ikon{font-size:64px;margin-bottom:20px;animation:spin-slow 3s linear infinite;}
@keyframes spin-slow{to{transform:rotate(360deg)}}
.split-lock-judul{font-size:20px;font-weight:800;color:#fff;margin-bottom:12px;line-height:1.3;}
.split-lock-pesan{font-size:14px;color:rgba(255,255,255,.75);line-height:1.7;max-width:320px;margin-bottom:28px;}
.split-lock-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);
  border:1.5px solid rgba(255,255,255,.25);border-radius:24px;padding:10px 20px;
  font-size:13px;font-weight:700;color:#10B981;animation:pulse-badge 1.8s ease-in-out infinite;}
@keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:.5}}
.split-lock-dot{width:10px;height:10px;border-radius:50%;background:#10B981;}

.p-wrap{width:100%;max-width:440px;margin:0 auto;padding:16px 0 48px;}
